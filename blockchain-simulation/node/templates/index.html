<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WobblyToken UI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 24px;
    }

    h1, h2 {
      margin-top: 0;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #475569;
      background: #0f172a;
      color: white;
      box-sizing: border-box;
      margin-top: 6px;
    }

    label {
      display: block;
      margin-bottom: 12px;
    }

    pre {
      background: #020617;
      padding: 16px;
      border-radius: 12px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 180px;
    }

    .muted {
      color: #94a3b8;
      font-size: 14px;
    }

    .success {
      color: #22c55e;
    }

    .error {
      color: #ef4444;
    }

    #miningStatus {
      display: none;
      margin-top: 12px;
      color: #93c5fd;
      font-weight: bold;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 3px solid #94a3b8;
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>WobblyToken UI</h1>
      <p class="muted">
        Node actuel : <strong>{{ node_name }}</strong><br>
        Peer : <strong>{{ peer }}</strong>
      </p>
    </div>

    <div class="card">
      <h2>Actions blockchain</h2>
      <div class="row">
        <button id="mineBtn" onclick="mineBlock()">Miner un bloc</button>
        <button onclick="syncChain()">Sync</button>
        <button onclick="showChain()">Voir la blockchain</button>
        <button onclick="showTransactions()">Voir les transactions</button>
      </div>

      <p id="miningStatus">
        <span class="spinner"></span>
        Minage en cours...
      </p>
    </div>

    <div class="card">
      <h2>Envoyer une transaction</h2>

      <label>
        Sender
        <input type="text" id="sender" placeholder="Alice">
      </label>

      <label>
        Receiver
        <input type="text" id="receiver" placeholder="Bob">
      </label>

      <label>
        Amount
        <input type="number" id="amount" placeholder="10" step="any">
      </label>

      <button onclick="sendTransaction()">Envoyer la transaction</button>
      <p id="status"></p>
    </div>

    <div class="card">
      <h2>Résultat</h2>
      <pre id="output">Clique sur un bouton…</pre>
    </div>
  </div>

  <script>
    const output = document.getElementById("output");
    const statusEl = document.getElementById("status");

    function setOutput(data) {
      output.textContent = typeof data === "string"
        ? data
        : JSON.stringify(data, null, 2);
    }

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.className = isError ? "error" : "success";
    }

    async function mineBlock() {
      const miningStatus = document.getElementById("miningStatus");
      const mineButton = document.getElementById("mineBtn");

      try {
        mineButton.disabled = true;
        miningStatus.style.display = "block";
        setStatus("Minage en cours...");

        const res = await fetch("/mine");
        const data = await res.json();

        setOutput(data);
        setStatus("Bloc miné avec succès.");
      } catch (err) {
        setStatus("Erreur pendant le minage.", true);
      } finally {
        miningStatus.style.display = "none";
        mineButton.disabled = false;
      }
    }

    async function syncChain() {
      try {
        const res = await fetch("/sync");
        const data = await res.json();
        setOutput(data);
        setStatus("Synchronisation terminée.");
      } catch (err) {
        setStatus("Erreur pendant le sync.", true);
      }
    }

    async function showChain() {
      try {
        const res = await fetch("/chain");
        const data = await res.json();
        setOutput(data);
        setStatus("Blockchain chargée.");
      } catch (err) {
        setStatus("Erreur pendant le chargement de la blockchain.", true);
      }
    }

    async function showTransactions() {
      try {
        const res = await fetch("/transaction");
        const data = await res.json();
        setOutput(data);
        setStatus("Transactions chargées.");
      } catch (err) {
        setStatus("Erreur pendant le chargement des transactions.", true);
      }
    }

    async function sendTransaction() {
      const sender = document.getElementById("sender").value.trim();
      const receiver = document.getElementById("receiver").value.trim();
      const amount = Number(document.getElementById("amount").value);

      if (!sender || !receiver || !Number.isFinite(amount)) {
        setStatus("Remplis sender, receiver et amount correctement.", true);
        return;
      }

      try {
        const res = await fetch("/transaction", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            sender,
            receiver,
            amount
          })
        });

        const data = await res.json();
        setOutput(data);

        if (res.ok) {
          setStatus("Transaction envoyée.");
        } else {
          setStatus("Transaction refusée.", true);
        }
      } catch (err) {
        setStatus("Erreur pendant l’envoi de la transaction.", true);
      }
    }
  </script>
</body>
</html>
